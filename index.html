<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karthik Chatbot</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background: linear-gradient(135deg,#0f0c29,#302b63,#ff00cc);
background-size:400% 400%;
animation: gradientBG 15s ease infinite;
overflow:hidden;
font-family: 'Segoe UI',sans-serif;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* floating shapes */

.shape{
position:absolute;
border-radius:50%;
filter: blur(70px);
opacity:0.4;
animation: float 12s infinite ease-in-out;
}

.shape1{
width:300px;
height:300px;
background:#ff00cc;
top:-50px;
left:-50px;
}

.shape2{
width:400px;
height:400px;
background:#00c3ff;
bottom:-100px;
right:-100px;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0px)}
}

/* glass effect */

.glass{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.15);
}

/* chat bubbles */

.user{
background:linear-gradient(135deg,#ff00cc,#8e2de2);
}

.bot{
background:rgba(255,255,255,0.1);
}

/* fade animation */

.message{
animation: fadeIn 0.4s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px)}
to{opacity:1; transform:translateY(0)}
}

/* typing indicator */

.typing span{
display:inline-block;
width:6px;
height:6px;
margin:2px;
background:white;
border-radius:50%;
animation: bounce 1s infinite;
}

.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}

@keyframes bounce{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

/* history scroll */

#historyList{
max-height:300px;
overflow-y:auto;
}

/* history item */

.historyItem{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
border-radius:8px;
cursor:pointer;
}

.historyItem:hover{
background:rgba(255,255,255,0.1);
}

/* menu button */

.menuBtn{
padding:2px 6px;
border-radius:6px;
cursor:pointer;
}

.menuBtn:hover{
background:rgba(255,255,255,0.2);
}

/* dropdown menu */

.dropdownMenu{
position:absolute;
background:white;
color:black;
border-radius:10px;
width:200px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
padding:8px 0;
z-index:1000;
}

.dropdownMenu div{
padding:8px 15px;
cursor:pointer;
}

.dropdownMenu div:hover{
background:#f1f1f1;
}

</style>
</head>

<body class="text-white">

<div class="shape shape1"></div>
<div class="shape shape2"></div>

<div class="flex h-screen">

<!-- Sidebar -->

<div class="w-64 glass p-6 flex flex-col space-y-6">

<h2 class="text-xl font-bold text-pink-300">Karthik AI</h2>

<button class="glass p-3 rounded-xl hover:bg-pink-500 transition">
New Chat
</button>

<button class="glass p-3 rounded-xl hover:bg-blue-500 transition">
Search Chats
</button>

<button class="glass p-3 rounded-xl hover:bg-purple-500 transition">
Saved Chats
</button>

<!-- History Section -->

<div>

<h3 class="text-sm text-gray-300 mt-4 mb-2">History</h3>

<div id="historyList" class="space-y-2 text-sm"></div>

</div>

</div>

<!-- Main Chat Area -->

<div class="flex-1 flex flex-col items-center">

<div class="text-center mt-8">

<h1 class="text-4xl font-bold">
Welcome to Karthik Chatbot 🤖
</h1>

<div class="mt-4 text-6xl animate-bounce">
🤖
</div>

</div>

<div id="chatWindow"
class="glass w-3/4 mt-8 p-6 rounded-2xl h-[500px] overflow-y-auto space-y-4">

</div>

<div class="w-3/4 mt-4 mb-6 flex glass rounded-full overflow-hidden">

<input id="messageInput"
type="text"
placeholder="Ask anything..."
class="flex-1 bg-transparent p-4 outline-none text-white">

<button onclick="sendMessage()"
class="px-6 bg-gradient-to-r from-pink-500 to-purple-600 hover:opacity-80">
Send
</button>

</div>

</div>

</div>

<script>

const input=document.getElementById("messageInput");
const chat=document.getElementById("chatWindow");

/* send message */

async function sendMessage(){

let text=input.value.trim();

if(text==="") return;

addMessage(text,"user");

input.value="";

showTyping();

let response = await fetch("/send_message",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
});

let data = await response.json();

removeTyping();

addMessage(data.reply,"bot");

loadHistory();

}

/* add chat bubble */

function addMessage(text,type){

let div=document.createElement("div");

div.className=`message max-w-xs p-3 rounded-2xl ${type==="user"?"user ml-auto":"bot"}`;

div.innerText=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

/* typing indicator */

function showTyping(){

let typing=document.createElement("div");

typing.id="typing";

typing.className="typing bot p-3 rounded-2xl w-fit";

typing.innerHTML="<span></span><span></span><span></span>";

chat.appendChild(typing);

}

function removeTyping(){

let typing=document.getElementById("typing");

if(typing) typing.remove();

}

/* load history */

async function loadHistory(){

let response = await fetch("/get_history");

let history = await response.json();

let container=document.getElementById("historyList");

container.innerHTML="";

history.reverse().forEach(chatItem=>{

let wrapper=document.createElement("div");
wrapper.className="historyItem";

let text=document.createElement("span");
text.innerText=chatItem.user;

text.onclick=function(){

chat.innerHTML="";

addMessage(chatItem.user,"user");
addMessage(chatItem.bot,"bot");

}

let menu=document.createElement("span");
menu.innerText="⋮";
menu.className="menuBtn";

menu.onclick=function(e){

e.stopPropagation();

let existing=document.querySelector(".dropdownMenu");
if(existing) existing.remove();

let dropdown=document.createElement("div");
dropdown.className="dropdownMenu";

dropdown.innerHTML=`
<div>Share</div>
<div>Start a group chat</div>
<div>Rename</div>
<div>Move to project</div>
<div>Pin chat</div>
<div>Archive</div>
<div style="color:red">Delete</div>
`;

document.body.appendChild(dropdown);

let rect=e.target.getBoundingClientRect();

dropdown.style.left=rect.left+"px";
dropdown.style.top=(rect.bottom+5)+"px";

document.addEventListener("click",()=>{
dropdown.remove();
},{once:true});

}

wrapper.appendChild(text);
wrapper.appendChild(menu);

container.appendChild(wrapper);

});

}

input.addEventListener("keypress",function(e){

if(e.key==="Enter") sendMessage();

});

window.onload=loadHistory;

</script>

</body>
</html>
